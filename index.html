<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 Sparepart Lookup — MIXING</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap');
  :root {
    --bg:#0f1117;--surface:#1a1d27;--card:#21253a;--border:#2e3350;
    --accent:#4f8ef7;--accent2:#7c5cfc;--green:#2ecc71;--yellow:#f0c040;
    --red:#e05555;--text:#e8eaf6;--muted:#7b82a8;--copy-bg:#2a2f4a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;min-height:100vh}

  /* LOADING */
  #loadingScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loadingScreen p{color:var(--muted);font-size:14px}

  /* ERROR */
  #errorScreen{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:12px;text-align:center}
  #errorScreen .icon{font-size:48px}
  #errorScreen h2{font-size:18px;font-weight:600}
  #errorScreen p{color:var(--muted);font-size:14px;max-width:360px;line-height:1.6}
  .retry-btn{margin-top:8px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer}

  /* APP */
  #appScreen{display:none}
  header{background:linear-gradient(135deg,#1a1d27,#161926);border-bottom:1px solid var(--border);padding:20px 24px 16px;position:sticky;top:0;z-index:100}
  .header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .logo{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .header-title h1{font-size:17px;font-weight:600}
  .header-title p{font-size:12px;color:var(--muted);margin-top:1px}
  .reload-btn{margin-left:auto;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-family:inherit;padding:6px 12px;cursor:pointer;transition:border-color .15s,color .15s}
  .reload-btn:hover{border-color:var(--accent);color:var(--accent)}
  .stats-strip{display:flex;gap:20px;font-size:12px;color:var(--muted)}
  .stats-strip strong{color:var(--accent);font-weight:600}
  .search-wrap{position:relative;margin-top:12px}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
  #searchInput{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px 12px 42px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s}
  #searchInput:focus{border-color:var(--accent)}
  #searchInput::placeholder{color:var(--muted)}
  .clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--border);border:none;color:var(--muted);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:13px;display:none;align-items:center;justify-content:center}
  .clear-btn.show{display:flex}

  main{padding:16px;max-width:900px;margin:0 auto}
  .result-bar{font-size:13px;color:var(--muted);margin-bottom:12px;padding:0 2px}
  .result-bar strong{color:var(--text)}
  .results-grid{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:border-color .15s,box-shadow .15s}
  .card:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.08)}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .desc{font-size:14px;font-weight:500;line-height:1.5;flex:1;word-break:break-word}
  .desc mark{background:rgba(79,142,247,.25);color:#8cb8ff;border-radius:3px;padding:0 1px}
  .mat-pill{display:flex;align-items:center;gap:6px;background:var(--copy-bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;flex-shrink:0}
  .mat-num{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.5px}
  .copy-icon{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px;border-radius:4px;font-size:13px;display:flex;align-items:center;transition:color .15s}
  .copy-icon:hover{color:var(--accent)}.copy-icon.copied{color:var(--green)}
  .card-bottom{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
  .tag{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);background:rgba(255,255,255,.04);border-radius:6px;padding:4px 9px}
  .tag.stock-ok{color:var(--green)}.tag.stock-low{color:var(--yellow)}.tag.stock-zero{color:var(--red)}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-state .icon{font-size:48px;margin-bottom:12px}
  .empty-state p{font-size:15px}.empty-state small{font-size:13px;margin-top:6px;display:block}
  .hint-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;justify-content:center}
  .chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;transition:border-color .15s,background .15s}
  .chip:hover{border-color:var(--accent);background:rgba(79,142,247,.1);color:var(--accent)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0)}
  @media(max-width:500px){header{padding:16px 16px 12px}.card{padding:12px 13px}.desc{font-size:13.5px}main{padding:12px}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <p>กำลังโหลดข้อมูล Sparepart...</p>
</div>

<!-- ERROR -->
<div id="errorScreen">
  <div class="icon">⚠️</div>
  <h2>โหลดข้อมูลไม่สำเร็จ</h2>
  <p id="errorDetail">ไม่สามารถดึงไฟล์ EXPORT.xlsx จาก GitHub ได้ กรุณาตรวจสอบว่าไฟล์อยู่ใน repo แล้ว</p>
  <button class="retry-btn" onclick="loadData()">🔄 ลองใหม่</button>
</div>

<!-- APP -->
<div id="appScreen">
  <header>
    <div class="header-top">
      <div class="logo">🔧</div>
      <div class="header-title">
        <h1>Sparepart Lookup</h1>
        <p>MIXING · Plant 1000 · SP01</p>
      </div>
      <button class="reload-btn" onclick="loadData()">🔄 รีโหลดข้อมูล</button>
    </div>
    <div class="stats-strip">
      <span>รายการทั้งหมด <strong id="totalCount">0</strong> รายการ</span>
      <span id="lastUpdate" style="color:var(--muted)"></span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="พิมพ์ชื่อ, รหัส, หรือ Part Number..." autocomplete="off" spellcheck="false">
      <button class="clear-btn" id="clearBtn">✕</button>
    </div>
  </header>
  <main>
    <div class="result-bar" id="resultBar"></div>
    <div class="results-grid" id="results"></div>
  </main>
</div>

<div class="toast" id="toast">✓ คัดลอก Material Number แล้ว</div>

<script>
// ── CONFIG — แก้แค่นี้ถ้าเปลี่ยนชื่อไฟล์หรือ repo ──
const EXCEL_URL = 'https://raw.githubusercontent.com/chaitthawattopz03-dot/sparpart/main/EXPORT.xlsx';

let DATA = [];
let HINTS = [];

async function loadData() {
  document.getElementById('loadingScreen').style.display = 'flex';
  document.getElementById('errorScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'none';

  try {
    const res = await fetch(EXCEL_URL + '?t=' + Date.now()); // cache-bust
    if (!res.ok) throw new Error(`HTTP ${res.status} — ไม่พบไฟล์ใน repo`);

    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

    if (rows.length === 0) throw new Error('ไม่พบข้อมูลใน sheet แรก');

    const keys = Object.keys(rows[0]);
    const findCol = (...cands) => keys.find(k => cands.some(c => k.toLowerCase().includes(c.toLowerCase()))) || '';

    const colMat  = findCol('Material','mat','รหัส');
    const colDesc = findCol('Description','Desc','ชื่อ','Name');
    const colLoc  = findCol('Storage location','Location','loc','คลัง');
    const colUnit = findCol('Base Unit','Unit','หน่วย');
    const colQty  = findCol('Unrestricted','Qty','Stock','จำนวน','คงเหลือ');

    if (!colMat || !colDesc) throw new Error('ไม่พบคอลัมน์ Material หรือ Description');

    DATA = rows
      .filter(r => /\d/.test(String(r[colMat])))
      .map(r => ({
        mat:  String(r[colMat]).trim(),
        desc: String(r[colDesc]).trim(),
        loc:  colLoc  ? String(r[colLoc]).trim()  : '-',
        unit: colUnit ? String(r[colUnit]).trim()  : '-',
        qty:  colQty  ? String(r[colQty]).trim()   : '0',
      }));

    if (DATA.length === 0) throw new Error('ไม่พบข้อมูลที่ถูกต้องในไฟล์');

    // top hints
    const wc = {};
    DATA.forEach(d => d.desc.split(/[\s_\-\/]+/).forEach(w => { if(w.length>=3) wc[w]=(wc[w]||0)+1; }));
    HINTS = Object.entries(wc).sort((a,b)=>b[1]-a[1]).slice(0,8).map(e=>e[0]);

    document.getElementById('totalCount').textContent = DATA.length;
    document.getElementById('lastUpdate').textContent = 'อัปเดต ' + new Date().toLocaleTimeString('th-TH');

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    render('');

  } catch(err) {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('errorDetail').textContent = err.message;
    document.getElementById('errorScreen').style.display = 'flex';
  }
}

// ── Search & render ──
function escapeRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function highlight(text,q){ return q ? text.replace(new RegExp(`(${escapeRegex(q)})`,'gi'),'<mark>$1</mark>') : text; }
function stockClass(v){ const n=parseFloat(v); return isNaN(n)||n===0?'stock-zero':n<=5?'stock-low':'stock-ok'; }
function stockIcon(v){ const n=parseFloat(v); return isNaN(n)||n===0?'⭕':n<=5?'⚠️':'✅'; }

let copyTimer=null, toastTimer=null;
const toast=document.getElementById('toast');

function copyMat(mat,btn){
  navigator.clipboard.writeText(mat).then(()=>{
    btn.classList.add('copied'); btn.textContent='✓';
    toast.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove('show'),2000);
    clearTimeout(copyTimer);  copyTimer=setTimeout(()=>{ btn.classList.remove('copied'); btn.textContent='⧉'; },2000);
  });
}

function render(query){
  const q=query.trim().toLowerCase();
  const filtered=q ? DATA.filter(d=>d.desc.toLowerCase().includes(q)||d.mat.includes(q)) : DATA;
  const rb=document.getElementById('resultBar');
  rb.innerHTML=q
    ? `พบ <strong>${filtered.length}</strong> รายการ สำหรับ "<strong>${query.trim()}</strong>"`
    : `แสดงทั้งหมด <strong>${DATA.length}</strong> รายการ`;

  const el=document.getElementById('results');
  if(filtered.length===0){
    el.innerHTML=`<div class="empty-state"><div class="icon">🔎</div><p>ไม่พบรายการ "<strong>${query.trim()}</strong>"</p><small>ลองค้นหาด้วยคำอื่น</small><div class="hint-chips">${HINTS.map(h=>`<span class="chip" onclick="setQuery('${h}')">${h}</span>`).join('')}</div></div>`;
    return;
  }
  el.innerHTML=filtered.map(d=>`
    <div class="card">
      <div class="card-top">
        <div class="desc">${highlight(d.desc,query.trim())}</div>
        <div class="mat-pill">
          <span class="mat-num">${highlight(d.mat,query.trim())}</span>
          <button class="copy-icon" onclick="copyMat('${d.mat}',this)" title="คัดลอก">⧉</button>
        </div>
      </div>
      <div class="card-bottom">
        <span class="tag ${stockClass(d.qty)}">${stockIcon(d.qty)} Stock: ${(parseFloat(d.qty)||0).toLocaleString()} ${d.unit}</span>
        <span class="tag">📍 ${d.loc}</span>
      </div>
    </div>`).join('');
}

function setQuery(val){ const i=document.getElementById('searchInput'); i.value=val; i.dispatchEvent(new Event('input')); i.focus(); }

document.getElementById('searchInput').addEventListener('input',function(){
  document.getElementById('clearBtn').classList.toggle('show',this.value.length>0);
  render(this.value);
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  const i=document.getElementById('searchInput'); i.value='';
  document.getElementById('clearBtn').classList.remove('show');
  render(''); i.focus();
});

// โหลดข้อมูลตอนเปิดหน้า
loadData();
</script>
</body>
</html>
