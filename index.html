<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 Sparepart Lookup — MIXING</title>
<script src="data.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap');
  :root{--bg:#0f1117;--card:#21253a;--border:#2e3350;--accent:#4f8ef7;--accent2:#7c5cfc;--green:#2ecc71;--yellow:#f0c040;--red:#e05555;--text:#e8eaf6;--muted:#7b82a8;--copy-bg:#2a2f4a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;min-height:100vh}

  header{background:linear-gradient(135deg,#1a1d27,#161926);border-bottom:1px solid var(--border);padding:20px 24px 16px;position:sticky;top:0;z-index:100}
  .header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .logo{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .header-title h1{font-size:17px;font-weight:600}
  .header-title p{font-size:12px;color:var(--muted);margin-top:1px}
  .stats-strip{display:flex;gap:20px;font-size:12px;color:var(--muted);margin-bottom:12px}
  .stats-strip strong{color:var(--accent);font-weight:600}

  .search-wrap{position:relative}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
  #searchInput{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 42px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s}
  #searchInput:focus{border-color:var(--accent)}
  #searchInput::placeholder{color:var(--muted)}
  .clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--border);border:none;color:var(--muted);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:13px;display:none;align-items:center;justify-content:center}
  .clear-btn.show{display:flex}

  main{padding:16px;max-width:960px;margin:0 auto}
  .result-bar{font-size:13px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .result-bar strong{color:var(--text)}
  .view-toggle{display:flex;gap:6px;margin-left:auto}
  .view-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;padding:5px 12px;cursor:pointer;transition:all .15s}
  .view-btn.active{border-color:var(--accent);color:var(--accent)}

  /* LIST VIEW */
  .results-list{display:flex;flex-direction:column;gap:10px}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
  .card:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.08)}
  .card-inner{padding:14px 16px}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .desc{font-size:14px;font-weight:500;line-height:1.5;flex:1;word-break:break-word}
  .desc mark{background:rgba(79,142,247,.25);color:#8cb8ff;border-radius:3px;padding:0 1px}
  .mat-pill{display:flex;align-items:center;gap:6px;background:var(--copy-bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px;flex-shrink:0}
  .mat-num{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.5px}
  .copy-icon{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px;border-radius:4px;font-size:14px;line-height:1;transition:color .15s}
  .copy-icon:hover{color:var(--accent)}.copy-icon.copied{color:var(--green)}
  .card-bottom{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);background:rgba(255,255,255,.04);border-radius:6px;padding:4px 9px}
  .tag.stock-ok{color:var(--green)}.tag.stock-low{color:var(--yellow)}.tag.stock-zero{color:var(--red)}

  /* IMAGE BUTTON */
  .img-btn{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:12px;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.3);color:var(--accent);border-radius:8px;padding:5px 11px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
  .img-btn:hover{background:rgba(79,142,247,.22);border-color:var(--accent)}
  .img-btn.loading{color:var(--muted);border-color:var(--border);background:transparent;cursor:default}
  .img-btn.loaded{background:rgba(46,204,113,.1);border-color:rgba(46,204,113,.4);color:var(--green)}

  /* IMAGE PANEL */
  .img-panel{display:none;padding:0 16px 14px;gap:8px;flex-wrap:wrap}
  .img-panel.show{display:flex}
  .img-panel img{width:calc(33.33% - 6px);min-width:80px;max-width:160px;height:100px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform .15s,border-color .15s}
  .img-panel img:hover{transform:scale(1.03);border-color:var(--accent)}
  .img-panel .img-err{font-size:12px;color:var(--muted);padding:10px}
  .img-panel .img-query{font-size:11px;color:var(--muted);width:100%;margin-top:4px}
  .img-panel .img-query a{color:var(--accent);text-decoration:none}
  .img-panel .img-query a:hover{text-decoration:underline}

  /* GRID VIEW */
  .results-grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .card-grid{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .15s,box-shadow .15s;cursor:pointer}
  .card-grid:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.08)}
  .card-grid-img{width:100%;height:130px;object-fit:cover;background:var(--copy-bg);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}
  .card-grid-img img{width:100%;height:130px;object-fit:cover}
  .card-grid-img.placeholder{font-size:28px}
  .card-grid-body{padding:10px 12px}
  .card-grid-desc{font-size:12.5px;font-weight:500;line-height:1.4;margin-bottom:6px;word-break:break-word}
  .card-grid-desc mark{background:rgba(79,142,247,.25);color:#8cb8ff;border-radius:3px;padding:0 1px}
  .card-grid-mat{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:4px}
  .card-grid-stock{font-size:11px}

  .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-state .icon{font-size:48px;margin-bottom:12px}
  .empty-state p{font-size:15px}.empty-state small{font-size:13px;margin-top:6px;display:block}
  .hint-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;justify-content:center}
  .chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;transition:border-color .15s,background .15s}
  .chip:hover{border-color:var(--accent);background:rgba(79,142,247,.1);color:var(--accent)}

  .pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:20px;padding-bottom:32px;flex-wrap:wrap}
  .page-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-family:inherit;padding:7px 14px;cursor:pointer;transition:border-color .15s,color .15s}
  .page-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .page-btn.active{border-color:var(--accent);color:var(--accent);font-weight:600}
  .page-btn:disabled{opacity:.35;cursor:default}
  .page-info{font-size:13px;color:var(--muted)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* LIGHTBOX */
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:center;justify-content:center}
  .lightbox.show{display:flex}
  .lightbox img{max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain}
  .lightbox-close{position:absolute;top:16px;right:20px;font-size:28px;color:#fff;cursor:pointer;line-height:1}

  @media(max-width:500px){
    header{padding:16px 16px 12px}.card-inner{padding:12px 13px}.desc{font-size:13.5px}main{padding:12px}
    .results-grid-2{grid-template-columns:repeat(2,1fr)}
    .img-panel img{height:80px}
  }
  
  .spin{display:inline-block;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">🔧</div>
    <div class="header-title">
      <h1>Sparepart Lookup</h1>
      <p>MIXING · Plant 1000</p>
    </div>
  </div>
  <div class="stats-strip">
    <span>รายการทั้งหมด <strong id="totalCount">0</strong> รายการ</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="พิมพ์ชื่อ, รหัส Material, Location..." autocomplete="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn">✕</button>
  </div>
</header>

<main>
  <div class="result-bar" id="resultBar">
    <span id="resultText"></span>
    <div class="view-toggle">
      <button class="view-btn active" id="btnList" onclick="setView('list')">☰ List</button>
      <button class="view-btn" id="btnGrid" onclick="setView('grid')">⊞ Grid</button>
    </div>
  </div>
  <div id="results"></div>
  <div class="pagination" id="pagination"></div>
</main>

<div class="toast" id="toast">✓ คัดลอก Material Number แล้ว</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const PAGE_SIZE = 30;
let filtered = [];
let currentPage = 1;
let viewMode = 'list'; // 'list' or 'grid'

// Image cache: mat -> {query, urls} or 'loading' or 'error'
const imgCache = {};

const wc = {};
SPAREPART_DATA.forEach(d => d.desc.split(/[\s_\-\/]+/).forEach(w => { if(w.length>=3) wc[w]=(wc[w]||0)+1; }));
const HINTS = Object.entries(wc).sort((a,b)=>b[1]-a[1]).slice(0,8).map(e=>e[0]);

document.getElementById('totalCount').textContent = SPAREPART_DATA.length.toLocaleString();

function escapeRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function highlight(text,q){ return q?text.replace(new RegExp(`(${escapeRegex(q)})`,'gi'),'<mark>$1</mark>'):text; }
function stockClass(v){ return v===0?'stock-zero':v<=5?'stock-low':'stock-ok'; }
function stockIcon(v){ return v===0?'⭕':v<=5?'⚠️':'✅'; }

let copyTimer=null, toastTimer=null;
const toast=document.getElementById('toast');

function copyMat(mat,btn){
  navigator.clipboard.writeText(mat).then(()=>{
    btn.classList.add('copied'); btn.textContent='✓';
    toast.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove('show'),2000);
    clearTimeout(copyTimer); copyTimer=setTimeout(()=>{ btn.classList.remove('copied'); btn.textContent='⧉'; },2000);
  });
}

function openLightbox(src){
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
}

// Translate Thai/technical desc to English search query via Claude API
async function getImageQuery(desc) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 60,
      system: 'You are a translator for industrial spare parts. Given a part description (Thai or English), return ONLY a short English search query (2-5 words) suitable for image search. Focus on the part type, not brand or size. No explanation, no punctuation, just the query.',
      messages: [{ role: 'user', content: desc }]
    })
  });
  const data = await resp.json();
  return data.content?.[0]?.text?.trim() || desc;
}

// Fetch images from Unsplash (free, no key needed for demo)
// Using picsum as fallback + Unsplash source API
async function fetchImages(query) {
  // Use Unsplash Source (redirect-based, no API key) - returns a random image for a query
  // We'll use multiple seeds to get 3 images
  const urls = [];
  const encodedQ = encodeURIComponent(query);
  // Unsplash Source API: https://source.unsplash.com/200x150/?{query}&sig={n}
  for (let i = 0; i < 3; i++) {
    urls.push(`https://source.unsplash.com/200x150/?${encodedQ}&sig=${Date.now()}_${i}`);
  }
  return urls;
}

async function loadImages(mat, desc, btnEl, panelEl) {
  if (imgCache[mat] && imgCache[mat] !== 'loading') {
    showImages(mat, panelEl);
    return;
  }
  if (imgCache[mat] === 'loading') return;

  imgCache[mat] = 'loading';
  btnEl.classList.add('loading');
  btnEl.innerHTML = '<span class="spin">⏳</span> กำลังโหลด…';

  try {
    const query = await getImageQuery(desc);
    const urls = await fetchImages(query);
    imgCache[mat] = { query, urls };
    btnEl.classList.remove('loading');
    btnEl.classList.add('loaded');
    btnEl.innerHTML = '🖼 ซ่อนรูป';
    showImages(mat, panelEl, query, urls);
  } catch(e) {
    imgCache[mat] = 'error';
    btnEl.classList.remove('loading');
    btnEl.innerHTML = '⚠️ โหลดไม่ได้';
    panelEl.classList.add('show');
    panelEl.innerHTML = `<span class="img-err">โหลดรูปไม่ได้ — <a href="https://images.google.com/search?q=${encodeURIComponent(desc)}&tbm=isch" target="_blank">ค้นใน Google Images</a></span>`;
  }
}

function showImages(mat, panelEl, query, urls) {
  const cache = imgCache[mat];
  if (!query && cache && cache !== 'loading' && cache !== 'error') {
    query = cache.query;
    urls = cache.urls;
  }
  panelEl.classList.add('show');
  panelEl.innerHTML = urls.map(u =>
    `<img src="${u}" loading="lazy" onerror="this.style.display='none'" onclick="openLightbox('${u}')">`
  ).join('') +
  `<div class="img-query">🔍 "${query}" · <a href="https://images.google.com/search?q=${encodeURIComponent(query+' industrial spare part')}&tbm=isch" target="_blank">ดูใน Google Images</a></div>`;
}

function toggleImages(mat, desc, btnEl, panelEl) {
  if (panelEl.classList.contains('show') && imgCache[mat] !== 'loading') {
    panelEl.classList.remove('show');
    if (imgCache[mat] && imgCache[mat] !== 'loading' && imgCache[mat] !== 'error') {
      btnEl.innerHTML = '🖼 ดูรูป';
      btnEl.classList.remove('loaded');
    }
    return;
  }
  loadImages(mat, desc, btnEl, panelEl);
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('btnList').classList.toggle('active', mode==='list');
  document.getElementById('btnGrid').classList.toggle('active', mode==='grid');
  renderPage();
}

function renderPage(){
  const start = (currentPage-1)*PAGE_SIZE;
  const page  = filtered.slice(start, start+PAGE_SIZE);
  const q     = document.getElementById('searchInput').value.trim();
  const container = document.getElementById('results');

  if (viewMode === 'list') {
    container.className = 'results-list';
    container.innerHTML = page.map(d => `
      <div class="card">
        <div class="card-inner">
          <div class="card-top">
            <div class="desc">${highlight(d.desc,q)}</div>
            <div class="mat-pill">
              <span class="mat-num">${highlight(d.mat,q)}</span>
              <button class="copy-icon" onclick="copyMat('${d.mat}',this)" title="คัดลอก">⧉</button>
            </div>
          </div>
          <div class="card-bottom">
            <span class="tag ${stockClass(d.qty)}">${stockIcon(d.qty)} Stock: ${d.qty.toLocaleString()} ${d.unit}</span>
            <span class="tag">📍 ${d.loc}</span>
            <button class="img-btn" id="imgbtn-${d.mat}" onclick="toggleImages('${d.mat}',${JSON.stringify(d.desc)},document.getElementById('imgbtn-${d.mat}'),document.getElementById('imgpanel-${d.mat}'))">🖼 ดูรูป</button>
          </div>
        </div>
        <div class="img-panel" id="imgpanel-${d.mat}"></div>
      </div>`).join('');
  } else {
    container.className = 'results-grid-2';
    container.innerHTML = page.map(d => {
      const cached = imgCache[d.mat];
      const hasImg = cached && cached !== 'loading' && cached !== 'error' && cached.urls;
      const imgHtml = hasImg
        ? `<div class="card-grid-img"><img src="${cached.urls[0]}" loading="lazy" onerror="this.parentElement.innerHTML='<span>📦</span>'"></div>`
        : `<div class="card-grid-img placeholder" onclick="loadGridImage('${d.mat}',${JSON.stringify(d.desc)},this)">📦<br><span style="font-size:10px;margin-top:4px;display:block;color:var(--accent)">แตะดูรูป</span></div>`;
      return `
        <div class="card-grid">
          ${imgHtml}
          <div class="card-grid-body">
            <div class="card-grid-desc">${highlight(d.desc,q)}</div>
            <div class="card-grid-mat">${highlight(d.mat,q)}</div>
            <div class="card-grid-stock tag ${stockClass(d.qty)}">${stockIcon(d.qty)} ${d.qty.toLocaleString()} ${d.unit}</div>
          </div>
        </div>`;
    }).join('');
  }

  renderPagination();
  window.scrollTo({top:0,behavior:'smooth'});
}

async function loadGridImage(mat, desc, el) {
  if (imgCache[mat] === 'loading') return;
  el.innerHTML = '<span class="spin" style="font-size:22px">⏳</span>';
  imgCache[mat] = 'loading';
  try {
    const query = await getImageQuery(desc);
    const urls = await fetchImages(query);
    imgCache[mat] = { query, urls };
    el.innerHTML = `<img src="${urls[0]}" loading="lazy" onerror="this.parentElement.innerHTML='<span>📦</span>'" onclick="openLightbox('${urls[0]}')">`;
  } catch(e) {
    el.innerHTML = '<span>❌</span>';
  }
}

function renderPagination(){
  const total=Math.ceil(filtered.length/PAGE_SIZE);
  const pg=document.getElementById('pagination');
  if(total<=1){pg.innerHTML='';return;}
  let html=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ ก่อน</button>`;
  let s=Math.max(1,currentPage-2), e=Math.min(total,s+4);
  if(e-s<4) s=Math.max(1,e-4);
  if(s>1) html+=`<button class="page-btn" onclick="goPage(1)">1</button>${s>2?'<span class="page-info">…</span>':''}`;
  for(let i=s;i<=e;i++) html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if(e<total) html+=`${e<total-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="goPage(${total})">${total}</button>`;
  html+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>ถัดไป ›</button>`;
  html+=`<span class="page-info">${((currentPage-1)*PAGE_SIZE+1).toLocaleString()}–${Math.min(currentPage*PAGE_SIZE,filtered.length).toLocaleString()} จาก ${filtered.length.toLocaleString()}</span>`;
  pg.innerHTML=html;
}

function goPage(p){
  const total=Math.ceil(filtered.length/PAGE_SIZE);
  if(p<1||p>total) return;
  currentPage=p; renderPage();
}

function search(query){
  const q=query.trim().toLowerCase();
  const rb=document.getElementById('resultText');
  filtered = q
    ? SPAREPART_DATA.filter(d=>d.desc.toLowerCase().includes(q)||d.mat.includes(q)||d.loc.toLowerCase().includes(q))
    : SPAREPART_DATA;

  rb.innerHTML = q
    ? `พบ <strong>${filtered.length.toLocaleString()}</strong> รายการ สำหรับ "<strong>${query.trim()}</strong>"`
    : `แสดงทั้งหมด <strong>${SPAREPART_DATA.length.toLocaleString()}</strong> รายการ`;

  if(filtered.length===0){
    document.getElementById('results').innerHTML=`
      <div class="empty-state">
        <div class="icon">🔎</div>
        <p>ไม่พบรายการ "<strong>${query.trim()}</strong>"</p>
        <small>ลองค้นหาด้วยคำอื่น หรือตรวจสอบใน SAP โดยตรง</small>
        <div class="hint-chips">${HINTS.map(h=>`<span class="chip" onclick="setQuery('${h}')">${h}</span>`).join('')}</div>
      </div>`;
    document.getElementById('pagination').innerHTML='';
    return;
  }
  currentPage=1; renderPage();
}

function setQuery(val){ const i=document.getElementById('searchInput'); i.value=val; i.dispatchEvent(new Event('input')); i.focus(); }

document.getElementById('searchInput').addEventListener('input',function(){
  document.getElementById('clearBtn').classList.toggle('show',this.value.length>0);
  search(this.value);
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  const i=document.getElementById('searchInput'); i.value='';
  document.getElementById('clearBtn').classList.remove('show');
  search(''); i.focus();
});

search('');
</script>
</body>
</html>
